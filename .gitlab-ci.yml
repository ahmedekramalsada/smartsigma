stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $DOCKER_HUB_USERNAME/spring-api

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $DOCKER_HUB_USERNAME -p $DOCKER_HUB_PASSWORD
  script:
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:latest
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache sshpass openssh-client
  script:
    - sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
        docker pull $IMAGE_NAME:latest &&
        docker stop spring-api || true &&
        docker rm spring-api || true &&
        docker run -d --name spring-api --restart always -p 8080:8080 $IMAGE_NAME:latest
      "
  only:
    - main